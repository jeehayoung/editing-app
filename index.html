<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>모인컴퍼니 법인차량관리</title>
  <link rel="stylesheet" href="./styles.css?v=20260303_trip2" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>모인컴퍼니 법인차량관리</h1>
      <p class="sub">🚗 <b>이중 주차 안내</b> 원활한 통행을 위해 반드시 재주차 부탁드립니다.<br>
  📞 <b>연락처 확인</b> 앞 유리 비상 연락처 비치 여부를 꼭 확인해 주세요.<br>
  📝 <b>기록 작성</b> 민원 예방을 위해 차량 이용 기록 작성에 동참해 주세요.
</p>
    </header>

    <section class="card">
      <h2>이용 등록</h2>

      <label class="label">차량</label>
      <select id="carSelect" class="input">
        <option value="">차량 목록 불러오는 중…</option>
      </select>

      <label class="label">운전자</label>
      <select id="driverSelect" class="input">
        <option value="">운전자 목록 불러오는 중…</option>
      </select>

      <div class="row">
        <label class="label">출차 시간 (출차 저장할 때 사용)</label>
        <div class="btnrow">
          <button id="depNow" class="btn primary" type="button">현재시간</button>
          <button id="depManualToggle" class="btn" type="button">직접입력</button>
        </div>
        <input id="depManual" class="input" type="datetime-local" readonly />
        <div class="hint">출차는 보통 바로 기록. 늦으면 ‘직접입력’으로 조정.</div>
      </div>

      <div class="row">
        <label class="label">입차 시간 (입차 저장할 때 사용)</label>
        <div class="btnrow">
          <button id="arrNow" class="btn primary" type="button">현재시간</button>
          <button id="arrManualToggle" class="btn" type="button">직접입력</button>
        </div>
        <input id="arrManual" class="input" type="datetime-local" readonly />
        <div class="hint">입차(반납)는 나중에 기록 가능. 하루 이상 지나도 OK.</div>
      </div>

      <label class="label">주차 위치 선택</label>
      <div class="hint">아래 버튼 맵에서 위치를 탭하세요. (출차/입차 저장 모두 동일하게 사용)</div>

      <div class="parking-map">
        <div class="map-label top">건물입구</div>

        <button class="spot" data-spot="B1" style="grid-area:b1" type="button">B1</button>
        <button class="spot" data-spot="C1" style="grid-area:c1" type="button">C1</button>

        <button class="spot" data-spot="A1" style="grid-area:a1" type="button">A1</button>
        <button class="spot" data-spot="B2" style="grid-area:b2" type="button">B2</button>
        <button class="spot" data-spot="C2" style="grid-area:c2" type="button">C2</button>
        <button class="spot" data-spot="D1" style="grid-area:d1" type="button">D1</button>

        <button class="spot" data-spot="A2" style="grid-area:a2" type="button">A2</button>
        <button class="spot" data-spot="D2" style="grid-area:d2" type="button">D2</button>

        <button class="spot" data-spot="A3" style="grid-area:a3" type="button">A3</button>
        <button class="spot" data-spot="D3" style="grid-area:d3" type="button">D3</button>

        <button class="spot" data-spot="A4" style="grid-area:a4" type="button">A4</button>
        <button class="spot" data-spot="D4" style="grid-area:d4" type="button">D4</button>

        <button class="spot" data-spot="D5" style="grid-area:d5" type="button">D5</button>
        <button class="spot" data-spot="D6" style="grid-area:d6" type="button">D6</button>

        <div class="map-label bottom">주차장입구</div>
      </div>

      <div class="row between">
        <div id="spotPreview" class="hint">선택된 위치: 없음</div>
        <button id="spotClear" class="btn small" type="button">선택 취소</button>
      </div>

      <!-- ✅ 버튼 2개 -->
      <div class="btnrow">
        <button id="checkoutBtn" class="btn primary full" type="button">출차 저장</button>
        <button id="returnBtn" class="btn full" type="button">입차 저장</button>
      </div>

      <!-- 저장중 오버레이 -->
      <div id="savingOverlay" class="overlay hidden" hidden aria-live="polite">
        <div class="overlay-box">
          <div class="spinner" aria-hidden="true"></div>
          <div class="overlay-text" id="savingText">처리 중…</div>
        </div>
      </div>

      <div id="toast" class="toast" aria-live="polite"></div>
    </section>

    <section class="card">
      <button id="toggleIntegr" class="accordion" type="button">
        Google Drive 연동 설정 <span id="statusBadge" class="badge on">자동 연동</span>
      </button>
      <div id="integrPanel" class="panel hidden">
        <label class="label">Apps Script Web App URL</label>
        <input id="apiUrl" class="input" readonly />
        <div class="hint">고정 URL로 자동 연동됩니다.</div>
      </div>
    </section>
  </main>

  <script src="./app.js?v=20260303_trip2"></script>
</body>
</html>
