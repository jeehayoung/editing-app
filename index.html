<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>모인 법인차량 입출기록</title>

<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<link rel="stylesheet" href="./styles.css?v=20260303_ui" />
</head>

<body>
<main class="container">

<header class="header">
<h1>모인 법인차량 입출기록</h1>

<p class="sub notice">

<span class="notice-item">
  🚗 <b>이중 주차 안내</b><br>
  원활한 통행을 위해 반드시 재주차 부탁드립니다.<br>
  📞 <b>연락처 확인</b><br>
  앞 유리 비상 연락처 비치 여부를 꼭 확인해 주세요.<br>
  📝 <b>기록 작성</b><br>
  민원 예방을 위해 차량 이용 기록 작성에 동참해 주세요.
</p>

</header>


<section class="card">

<h2>기록모드선택</h2>

<div class="btnrow">
<button id="modeCheckout" class="btn primary full" type="button">출차 등록</button>
<button id="modeReturn" class="btn full" type="button">입차 등록</button>
</div>

<div class="hint" id="modeHint">
출차 등록: 출차시간/출차운전자만 입력하세요
</div>

</section>


<section class="card">

<h2>이용 등록</h2>

<label class="label">차량선택</label>

<select id="carSelect" class="input">
<option value="">차량 목록 불러오는 중…</option>
</select>


<!-- 출차 영역 -->

<div id="checkoutSection">

<label class="label">출차 운전자</label>

<select id="depDriverSelect" class="input">
<option value="">운전자 목록 불러오는 중…</option>
</select>


<div class="row">

<label class="label">출차 시간</label>

<div class="btnrow">
<button id="depNow" class="btn primary" type="button">현재시간입력</button>
<button id="depManualToggle" class="btn" type="button">직접입력</button>
</div>

<input id="depManual" class="input" type="datetime-local" readonly />

<div class="hint">
출차시 바로 기록해주시고 늦게 기록한 경우 직접입력해주세요.
</div>

</div>

</div>


<!-- 입차 영역 -->

<div id="returnSection" class="hidden" hidden>

<label class="label">입차 운전자</label>

<select id="arrDriverSelect" class="input">
<option value="">운전자 목록 불러오는 중…</option>
</select>


<div class="row">

<label class="label">입차 시간</label>

<div class="btnrow">
<button id="arrNow" class="btn primary" type="button">현재시간입력</button>
<button id="arrManualToggle" class="btn" type="button">직접입력</button>
</div>

<input id="arrManual" class="input" type="datetime-local" readonly />

<div class="hint">
입차시 바로 기록해주시고 늦게 기록한 경우 직접입력해주세요.</div>

</div>


<label class="label">주차 위치 선택</label>

<div class="parking-map">

<div class="map-label top">B1건물입구</div>

<button class="spot" data-spot="B1" style="grid-area:b1">B1</button>
<button class="spot" data-spot="C1" style="grid-area:c1">C1</button>

<button class="spot" data-spot="A1" style="grid-area:a1">A1</button>
<button class="spot" data-spot="B2" style="grid-area:b2">B2</button>
<button class="spot" data-spot="C2" style="grid-area:c2">C2</button>
<button class="spot" data-spot="D1" style="grid-area:d1">D1</button>

<button class="spot" data-spot="A2" style="grid-area:a2">A2</button>
<button class="spot" data-spot="D2" style="grid-area:d2">D2</button>

<button class="spot" data-spot="A3" style="grid-area:a3">A3</button>
<button class="spot" data-spot="D3" style="grid-area:d3">D3</button>

<button class="spot" data-spot="A4" style="grid-area:a4">A4</button>
<button class="spot" data-spot="D4" style="grid-area:d4">D4</button>

<button class="spot" data-spot="D5" style="grid-area:d5">D5</button>
<button class="spot" data-spot="D6" style="grid-area:d6">D6</button>

<div class="map-label bottom">주차장입구</div>

</div>

<div class="row between">
<div id="spotPreview" class="hint">선택된 위치: 없음</div>
<button id="spotClear" class="btn small">선택 취소</button>
</div>

</div>


<button id="saveBtn" class="btn primary full">저장</button>


<div id="savingOverlay" class="overlay hidden" hidden>

<div class="overlay-box">
<div class="spinner"></div>
<div class="overlay-text">처리 중…</div>
</div>

</div>


<div id="toast" class="toast"></div>

</section>


<section class="card">

<button id="toggleIntegr" class="accordion">
MOINCOMPANY
<span id="statusBadge" class="badge on">자동 연동</span>
</button>

<div id="integrPanel" class="panel hidden">

<label class="label">Apps Script Web App URL</label>
<input id="apiUrl" class="input" readonly />

<div class="hint">
⚠️이 부분은 삭제하거나 수정하지 마세요
</div>

</div>

</section>

</main>

<script src="./app.js?v=20260303_ui"></script>

</body>
</html>
